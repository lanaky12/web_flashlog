{% extends 'base.html'%}
{% block content %}
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap"
          rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
          rel="stylesheet">
    <style>
                :root {
        /* Updated Palette for Deep Dark Violet Theme */
        --primary: #efdd8d; /* Updated to Light Gold */
        --on-primary: #161f00;
        --primary-container: #4d5b24;
        --on-primary-container: #e8fab2;
        --secondary: #d8c779;
        --secondary-container: #524603;
        --on-secondary-container: #f5e392;

        /* Main Background Change */
        --surface: #210124;
        --on-surface: #fbf9f1; /* High contrast off-white */
        --on-surface-variant: #c6c8b8;
        --outline: #76786b;
        --outline-variant: #46483c;

        /* Elevated Surfaces */
        --surface-container: #2d0b30;
        --surface-container-high: #3a1a3d;
        --surface-container-highest: #47294a;

        --border-radius-xl: 0.75rem;
        --border-radius-lg: 0.5rem;
        --font-family: 'Inter', sans-serif;
    }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--surface);
            color: var(--on-surface);
            overflow-x: hidden;
        }

        /* Sidebar Sidebar Styling */
        #sidebar {
            width: 260px;
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            background-color: var(--surface-container-low);
            border-right: 1px solid var(--outline-variant);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 1.5rem 0;
        }

        .main-content {
            margin-left: 260px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .nav-link {
            color: var(--on-surface-variant);
            padding: 0.75rem 1.5rem;
            margin: 0.125rem 0.5rem;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background-color: var(--surface-container-high);
            color: var(--bs-primary);
        }

        .nav-link.active {
            background-color: var(--secondary-container);
            color: var(--on-secondary-container) !important;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        /* Header Styling */
        header {
            background-color: rgba(33, 1, 36, 0.8);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 999;
            padding: 1rem 3rem;
        }

        .search-container {
            position: relative;
            max-width: 320px;
        }

        .search-container .material-symbols-outlined {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--on-surface-variant);
        }

        .search-input {
            padding-left: 2.5rem;
            border-radius: 2rem;
            border: 1px solid var(--outline-variant);
            background-color: var(--surface-container-high);
            font-size: 14px;
            color: var(--on-surface);
        }

        .search-input:focus {
            box-shadow: 0 0 0 2px var(--bs-primary);
            background-color: var(--surface-container-high);
            color: var(--on-surface);
        }

        .btn-primary-eco {
            background-color: var(--bs-primary);
            color: #1b1c17;
            border-radius: 2rem;
            padding: 0.5rem 1.5rem;
            font-weight: 700;
            font-size: 14px;
            border: none;
            transition: opacity 0.2s;
        }

        .btn-primary-eco:hover {
            opacity: 0.9;
            color: #1b1c17;
        }

        /* Stats Card Styling */
        .stat-card {
            background: var(--surface-container-low);
            border: 1px solid var(--outline-variant);
            border-radius: 0.75rem;
            padding: 1.5rem;
        }

        /* Table Styling */
        .table-container {
            background: var(--surface-container-low);
            border: 1px solid var(--outline-variant);
            border-radius: 0.75rem;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .table thead th {
            background-color: var(--surface-container-high);
            color: var(--on-surface-variant);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--outline-variant);
        }

        .table tbody td {
            padding: 1rem 1.5rem;
            vertical-align: middle;
            border-bottom: 1px solid var(--outline-variant);
            color: var(--on-surface);
        }

        .order-row:hover {
            background-color: var(--surface-container-high);
            cursor: pointer;
        }

        .badge-status {
            font-size: 11px;
            font-weight: 700;
            padding: 0.35rem 0.75rem;
            border-radius: 2rem;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .badge-fragile {
            background-color: var(--error-container);
            color: var(--on-error-container);
        }

        .badge-standard {
            background-color: var(--secondary-container);
            color: var(--on-secondary-container);
        }

        .badge-size {
            background-color: var(--primary);
            color: var(--on-surface-variant);
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* Pagination Styling */
        .pagination .page-link {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.5rem;
            margin: 0 0.25rem;
            border: 1px solid var(--outline-variant);
            background-color: var(--surface-container-high);
            color: var(--on-surface);
            font-weight: 600;
        }

        .pagination .page-item.active .page-link {
            background-color: var(--bs-primary);
            border-color: var(--bs-primary);
            color: #1b1c17;
        }

        .pagination .page-item.disabled .page-link {
            background-color: var(--surface-container-low);
            opacity: 0.5;
            color: var(--on-surface-variant);
        }

        footer {
            background-color: var(--surface-container-lowest);
            padding: 2rem 3rem;
            margin-top: auto;
            border-top: 1px solid var(--outline-variant);
        }

        .fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 56px;
            height: 56px;
            border-radius: 1rem;
            background-color: var(--bs-primary);
            color: #1b1c17;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.4);
            border: none;
            z-index: 1001;
            transition: transform 0.2s;
        }

        .fab:hover {
            transform: scale(1.05);
        }

        .text-primary {
            color: var(--bs-primary) !important;
        }

        .text-muted {
            color: var(--on-surface-variant) !important;
        }

        .btn-light {
            background-color: var(--primary);
            border: none;
            color: var(--on-surface);
        }

        .btn-light:hover {
            background-color: var(--outline-variant);
            color: var(--bs-primary);
        }

        @media (max-width: 991.98px) {
            #sidebar {
                display: none;
            }

            .main-content {
                margin-left: 0;
            }
        }
    </style>
<body>
<div class="d-flex flex-column flex-lg-row">
    <!-- Navigation Drawer -->

    <!-- Main Content Area -->
    <main class="main-content w-100">
        <header class="top-app-bar d-flex justify-content-between align-items-center">
            <div>
                <h1 class="h3 fw-bold text-white mb-0">Histórico de Encomendas</h1>
                <p class="text-muted mb-0" style="font-size: 0.875rem;">Histórico de rastreamento global e gerenciamento
                    estratégico.</p></div>
            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-link text-on-surface p-2 rounded-circle"
                        style="text-decoration: none; color: var(--bs-on-surface);"></button>
                <button class="btn btn-white-custom"><a href="{{url_for('cad_locais')}}">Adicionar</a>
                </button>
            </div>
        </header>
        <!-- Dashboard Content -->
        <div class="container-fluid px-lg-5 py-4">
            <!-- KPI Row -->
            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="card-stat">
                        <div class="text-uppercase text-muted mb-1"
                             style="font-size: 0.75rem; letter-spacing: -0.02em;">Total de Centros:
                        </div>
                        <h3 class="text-white fw-bold mb-0">124</h3></div>
                </div>
                <div class="col-md-3">
                    <div class="card-stat">
                        <div class="text-uppercase text-muted mb-1"
                             style="font-size: 0.75rem; letter-spacing: -0.02em;">Pontuação de Eficiência
                        </div>
                        <h3 class="text-white fw-bold mb-0">98.4%</h3>
                    </div>
                </div>
            </div>
            <!-- Audit Log Table -->
            <div class="data-table-container"
                 style="border-radius: 1rem; border: 1px solid var(--outline-variant); overflow: hidden; box-shadow: rgba(0, 0, 0, 0.2) 0px 4px 12px; background-color: rgb(71, 41, 74) !important;">
                <div class="px-4 py-3 d-flex justify-content-between align-items-center table-header-custom">
                    <h3 class="h5 mb-0 fw-bold">Encomendas recentes</h3>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover mb-0 border-0">
                        <thead>
                        <tr>
                            <th class="">id</th>
                            <th class="">Peso</th>
                            <th class="">Frágil</th>
                            <th class="">Tamanho</th>
                            <th class="">Destinatário</th>
                            <th class="">Codigo rastreio</th>

                            <th></th>
                        </tr>
                        </thead>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>
<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.querySelectorAll('tbody tr').forEach(row => {
        row.addEventListener('click', () => {
            document.querySelectorAll('tbody tr').forEach(r => r.classList.remove('active-row'));
            row.classList.add('active-row');
        });
    });
</script>
</body>

{% endblock %}
