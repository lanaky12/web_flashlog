
<!DOCTYPE html>
<html lang="pt-br" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Frontend</title>
    <!--- link do bootstrap - Antes do CSS--->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--- link do bootstrap icons--->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!--- link do CSS--->
    <link rel="stylesheet" href="/static/css/style.css"/>
    <style class="">
        :root {
            --bs-primary: #f4fdaf; /* Lighter primary for dark background */
            --bs-primary-rgb: 189, 206, 138;
            --bs-secondary: #d8c779;
            --bs-surface: #210124; /* Requested page background */
            --bs-surface-variant: #3a1d3d;
            --bs-on-surface: #f3f1e9;
            --bs-on-surface-variant: #c6c8b8;
            --bs-outline-variant: #4a334d;
            --bs-surface-container-low: #2d0e30;
            --bs-surface-container: #361839;
            --bs-surface-container-high: #432646;
            --bs-secondary-container: #524603;
            --bs-on-secondary-container: #f5e392;
            --bs-tertiary: #c4cc83;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bs-surface);
            color: var(--bs-on-surface);
            min-height: 100vh;
        }

        /* Remove qualquer borda, fundo ou outline verde da div menu */
        .menu {
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            outline: none !important;
        }


        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background-color: var(--bs-surface-container-low);
            border-right: 1px solid var(--bs-outline-variant);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 1.5rem 0;
        }

        .sidebar .nav-link {
            color: var(--bs-on-surface-variant);
            padding: 0.75rem 1.5rem;
            margin: 0.125rem 0.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s;
        }

        .sidebar .nav-link:hover {
            background-color: var(--bs-surface-variant);
            color: var(--bs-on-surface);
        }

        .sidebar .nav-link.active {
            background-color: var(--bs-secondary-container);
            color: var(--bs-on-secondary-container);
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-app-bar {
            background-color: var(--bs-surface);
            padding: 1rem 3rem;
            position: sticky;
            top: 0;
            z-index: 999;
        }

        /* Components */
        .card-stat {
            background-color: var(--bs-surface-container-low);
            border: 1px solid var(--bs-outline-variant);
            border-radius: 1rem;
            padding: 1.5rem;
        }

        .audit-table-card {
            background-color: var(--bs-surface-container-low);
            border-radius: 1rem;
            border: 1px solid var(--bs-outline-variant);
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .table {
            color: var(--bs-on-surface);
        }

        .table thead th {
            background-color: var(--bs-surface-container);
            color: var(--bs-on-surface-variant);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 1rem 1.5rem;
            border: none;
        }

        .table tbody td {
            padding: 1rem 1.5rem;
            vertical-align: middle;
            border-color: var(--bs-outline-variant);
        }

        .table tbody tr:hover {
            background-color: var(--bs-surface-variant);
            cursor: pointer;
        }

        .active-row {

            background-color: var(--bs-surface-variant) !important;
        }

        .btn-primary-custom {
            background-color: var(--bs-primary);
            color: #161f00; /* Dark text on light primary */
            border: none;
            border-radius: 999px;
            padding: 0.5rem 1.5rem;
            font-weight: 700;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn-primary-custom:hover {
            opacity: 0.9;
            color: #161f00;
        }

        .btn-primary-custom:active {
            transform: scale(0.95);
        }

        .badge-pill-custom {
            background-color: var(--bs-secondary-container);
            color: var(--bs-on-secondary-container);
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .profile-section {
            margin-top: auto;
            padding: 1rem;
            border-top: 1px solid var(--bs-outline-variant);
        }

        .profile-card {
            background-color: var(--bs-surface-container);
            border-radius: 1rem;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .profile-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .text-muted {
            color: var(--bs-on-surface-variant) !important;
        }

        .text-primary {
            color: var(--bs-primary) !important;
        }

        .text-secondary {
            color: var(--bs-secondary) !important;
        }

        .text-tertiary {
            color: var(--bs-tertiary) !important;
        }

        @media (max-width: 991.98px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid var(--bs-outline-variant);
            }

            .main-content {
                margin-left: 0;
            }

            .top-app-bar {
                padding: 1rem;
            }
        }


    </style>
    <section class="p-4 p-lg-5 flex-grow-1">
        <div class="container-fluid px-0">
            <div class="menu">
                <aside class="sidebar">
                    <div class="px-4 mb-4 d-flex align-items-center gap-3">
                        <span class="material-symbols-outlined text-white fs-3"
                              style="font-variation-settings: 'FILL' 1;">local_shipping</span>
                        <span class="fw-black fs-4 text-white" style="font-weight: 900;">FlashLog</span>
                    </div>
                        <a class="nav-link" href="{{url_for('clientes')}}">
                            <span class="material-symbols-outlined">group</span>
                            <span class="">Clientes</span>
                        </a>
                        <a class="nav-link" href="{{url_for('encomendas')}}">
                            <span class="material-symbols-outlined">package_2</span>
                            <span class="">Encomendas</span>
                        </a>
                        <a class="nav-link" href="{{url_for('movimentacoes')}}">
                            <span class="material-symbols-outlined">swap_horiz</span>
                            <span class="">Movimentações</span>
                        </a>
                        <a class="nav-link active" href="{{url_for('locais')}}">
                            <span class="material-symbols-outlined">business</span>
                            <span class="">Centros</span>
                        </a>
                    </nav>
                </aside>
            </div>
        </div>
    </section>
</head>
<body>
<main class="container-fluid p-">
    {% block content %}
    {% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
<script src="/static/js/verificacoes.js"></script>
<script src="/static/js/apis.js"></script>
</body>
</html>
