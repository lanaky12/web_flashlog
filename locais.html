{% extends 'base.html'%}
{% block content %}
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style class="">
                :root {
        /* Updated Palette for Deep Dark Violet Theme */
        --primary: #efdd8d; /* Updated to Light Gold */
        --on-primary: #161f00;
        --primary-container: #4d5b24;
        --on-primary-container: #e8fab2;
        --secondary: #d8c779;
        --secondary-container: #524603;
        --on-secondary-container: #f5e392;

        /* Main Background Change */
        --surface: #210124;
        --on-surface: #fbf9f1; /* High contrast off-white */
        --on-surface-variant: #c6c8b8;
        --outline: #76786b;
        --outline-variant: #46483c;

        /* Elevated Surfaces */
        --surface-container: #2d0b30;
        --surface-container-high: #3a1a3d;
        --surface-container-highest: #47294a;

        --border-radius-xl: 0.75rem;
        --border-radius-lg: 0.5rem;
        --font-family: 'Inter', sans-serif;
    }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bs-surface);
            color: var(--bs-on-surface);
            min-height: 100vh;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px;
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background-color: var(--bs-surface-container-low);
            border-right: 1px solid var(--bs-outline-variant);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 1.5rem 0;
        }

        .sidebar .nav-link {
            color: var(--bs-on-surface-variant);
            padding: 0.75rem 1.5rem;
            margin: 0.125rem 0.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s;
        }

        .sidebar .nav-link:hover {
            background-color: var(--bs-surface-variant);
            color: var(--bs-on-surface);
        }

        .sidebar .nav-link.active {
            background-color: var(--bs-secondary-container);
            color: var(--bs-on-secondary-container);
        }

        /* Main Content */
        .main-content {
            margin-left: 260px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .top-app-bar {
            background-color: var(--bs-surface);
            padding: 1rem 3rem;
            position: sticky;
            top: 0;
            z-index: 999;
        }

        /* Components */
        .card-stat {
            background-color: var(--bs-surface-container-low);
            border: 1px solid var(--bs-outline-variant);
            border-radius: 1rem;
            padding: 1.5rem;
        }

        .audit-table-card {
            background-color: var(--bs-surface-container-low);
            border-radius: 1rem;
            border: 1px solid var(--bs-outline-variant);
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .table {
            color: var(--bs-on-surface);
        }

        .table thead th {
            background-color: var(--bs-surface-container);
            color: var(--bs-on-surface-variant);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 1rem 1.5rem;
            border: none;
        }

        .table tbody td {
            padding: 1rem 1.5rem;
            vertical-align: middle;
            border-color: var(--bs-outline-variant);
        }

        .table tbody tr:hover {
            background-color: var(--bs-surface-variant);
            cursor: pointer;
        }

        .active-row {
            border-left: 4px solid var(--bs-primary);
            background-color: var(--bs-surface-variant) !important;
        }

        .btn-primary-custom {
            background-color: var(--bs-primary);
            color: #161f00; /* Dark text on light primary */
            border: none;
            border-radius: 999px;
            padding: 0.5rem 1.5rem;
            font-weight: 700;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn-primary-custom:hover {
            opacity: 0.9;
            color: #161f00;
        }

        .btn-primary-custom:active {
            transform: scale(0.95);
        }

        .badge-pill-custom {
            background-color: var(--bs-secondary-container);
            color: var(--bs-on-secondary-container);
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .profile-section {
            margin-top: auto;
            padding: 1rem;
            border-top: 1px solid var(--bs-outline-variant);
        }

        .profile-card {
            background-color: var(--bs-surface-container);
            border-radius: 1rem;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .profile-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .text-muted {
            color: var(--bs-on-surface-variant) !important;
        }

        .text-primary {
            color: var(--bs-primary) !important;
        }

        .text-secondary {
            color: var(--bs-secondary) !important;
        }

        .text-tertiary {
            color: var(--bs-tertiary) !important;
        }

        @media (max-width: 991.98px) {
            .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--bs-outline-variant); }
            .main-content { margin-left: 0; }
            .top-app-bar { padding: 1rem; }
        }
    </style>
<body>
<div class="d-flex flex-column flex-lg-row">
<!-- Navigation Drawer -->

<!-- Main Content Area -->
<main class="main-content w-100">
<header class="top-app-bar d-flex justify-content-between align-items-center"><div>
<h1 class="h3 fw-bold text-primary mb-0">Histórico de Galpões</h1>
<p class="text-muted mb-0" style="font-size: 0.875rem;">Histórico de rastreamento global e gerenciamento estratégico.</p></div>
<div class="d-flex align-items-center gap-3">
<button class="btn btn-link text-on-surface p-2 rounded-circle" style="text-decoration: none; color: var(--bs-on-surface);"></button>
<button class="btn btn-primary-custom"><a href="{{url_for('cad_locais')}}">Adicionar</a></button>
</div></header>
<!-- Dashboard Content -->
<div class="container-fluid px-lg-5 py-4">
<!-- KPI Row -->
<div class="row g-4 mb-4">
<div class="col-md-3">
<div class="card-stat">
<div class="text-uppercase text-muted mb-1" style="font-size: 0.75rem; letter-spacing: -0.02em;">Total de Centros:</div>
<h3 class="text-primary fw-bold mb-0">124</h3></div>
</div><div class="col-md-3">
<div class="card-stat">
<div class="text-uppercase text-muted mb-1" style="font-size: 0.75rem; letter-spacing: -0.02em;">Pontuação de Eficiência</div>
<h3 class="text-primary fw-bold mb-0">98.4%</h3>
</div></div></div>
<!-- Audit Log Table -->
<div class="audit-table-card">
<div class="p-4 border-bottom d-flex justify-content-between align-items-center" style="border-color: var(--bs-outline-variant) !important;">
<h2 class="h5 fw-bold mb-0">Audit Log</h2></div>
<div class="table-responsive" style="background-color: rgb(244, 253, 175);">
    <table class="table">
    <thead>
    <tr>
        <th scope="col">ID</th>
        <th scope="col">Nome</th>
        <th scope="col">Status</th>

    </tr>
    </thead>

</table>
</div>
</div>
</div></main></div>
<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.querySelectorAll('tbody tr').forEach(row => {
        row.addEventListener('click', () => {
            document.querySelectorAll('tbody tr').forEach(r => r.classList.remove('active-row'));
            row.classList.add('active-row');
        });
    });
</script>
{% endblock %}
